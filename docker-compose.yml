services:
  postgres:
    image: postgres:16-alpine
    container_name: dinet-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dinet_dev}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-dinet_dev}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  dinet-orders:
    build: .
    container_name: dinet-orders
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-dinet_dev}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
