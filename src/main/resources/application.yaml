dinet:
  orders:
    import:
      batch-size: 500
  security:
    jwt:
      # Generate in https://jwtsecrets.com/#generator
      secret: ${DINET_SECURITY_JWT_SECRET:82f021ce15e0faabf5fe5274e1d2c393}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: dinet-prueba
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:dinet_dev}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
          batch_size: ${dinet.orders.import.batch-size}
        order_inserts: true
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui
