dinet:
  orders:
    import:
      batch-size: 500

spring:
  datasource:
    url: jdbc:h2:mem:dinet_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: ${dinet.orders.import.batch-size}
        order_inserts: true
  flyway:
    enabled: false
  batch:
    jdbc:
      initialize-schema: always
